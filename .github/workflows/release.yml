name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    name: Publish to Hex.pm
    runs-on: ubuntu-latest
    env:
      HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "27"
      - name: Install dependencies
        run: mix deps.get
      - name: Compile
        run: mix compile
      - name: Run tests
        run: mix test
      - name: Publish to Hex.pm
        run: mix hex.publish --yes