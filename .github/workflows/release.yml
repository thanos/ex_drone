name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  ELIXIR_VERSION: "1.18"
  OTP_VERSION: "27"

jobs:
  publish-hex:
    name: Publish to Hex.pm
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}
      - name: Install dependencies
        run: mix deps.get
      - name: Compile
        run: mix compile --warnings-as-errors
      - name: Run tests
        run: mix test
      - name: Publish to Hex.pm
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix hex.publish --yes

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-hex]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}
      - name: Install dependencies
        run: mix deps.get
      - name: Build docs
        run: mix docs
      - name: Package docs
        run: tar -czf docs.tar.gz -C doc .
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
      - name: Find release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          NOTES_FILE="notes_n_notices/release_notes_v${VERSION}.md"
          NOTICE_FILE="notes_n_notices/release_notice_v${VERSION}.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "path=$NOTES_FILE" >> "$GITHUB_OUTPUT"
          elif [ -f "$NOTICE_FILE" ]; then
            echo "path=$NOTICE_FILE" >> "$GITHUB_OUTPUT"
          else
            echo "path=CHANGELOG.md" >> "$GITHUB_OUTPUT"
          fi
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          body_path: ${{ steps.notes.outputs.path }}
          draft: false
          prerelease: false
          files: |
            docs.tar.gz